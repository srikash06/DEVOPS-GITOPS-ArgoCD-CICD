name: CICD with Maven, Docker, Argo, Kubernetes

on:
  push:
    branches: [ master ]

permissions:
  contents: write

jobs:
  cicd:
    env:
      imagename: "cicdimage"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Build with Maven
        run: mvn clean install

      - name: Install docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to DockerHub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.imagename }}:${{ github.run_number }}

      - name: Update Helm values and push
        run: |
          cd argocdhelm
          sed -i "s/^ *tag:.*/tag: ${{ github.run_number }}/" values.yaml
          git config --global user.email 'user@example.com'
          git config --global user.name 'GitHub Actions'
          git add values.yaml
          git commit -m "Update image tag to ${{ github.run_number }}" || echo "No changes to commit"
          git push
